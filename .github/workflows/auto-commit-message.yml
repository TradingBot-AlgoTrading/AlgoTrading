name: Auto Commit Message

on:
  push:
    branches: ["*"]

permissions:
  contents: write

jobs:
  update-commit-message:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Debug info
        run: |
          echo "=== Commit Info ==="
          echo "Message: $(git log -1 --pretty=format:'%s')"
          echo "Author: $(git log -1 --pretty=format:'%an')"

      - name: Generate commit message
        if: ${{ !contains(github.event.head_commit.message, ':') }}
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          DIFF=$(git diff HEAD~1 HEAD 2>/dev/null | head -c 3000)
          
          if [ -z "$DIFF" ]; then
            echo "No diff found, skipping"
            exit 0
          fi
          
          cat > /tmp/request.json << 'ENDJSON'
          {
            "model": "mimo-v2.5-free",
            "messages": [
              {
                "role": "user",
                "content": "Generate a conventional commit message (type: description). Only return the message."
              }
            ],
            "max_tokens": 100,
            "temperature": 0.3
          }
          ENDJSON
          
          RESPONSE=$(curl -s -X POST \
            "https://opencode.ai/zen/v1/chat/completions" \
            -H "Authorization: Bearer $OPENCODE_API_KEY" \
            -H "Content-Type: application/json" \
            -d @/tmp/request.json)
          
          echo "Response: $RESPONSE"
          
          COMMIT_MSG=$(echo "$RESPONSE" | jq -r '.choices[0].message.content' 2>/dev/null | head -1 | cut -c1-72)
          
          if [ -n "$COMMIT_MSG" ] && [ "$COMMIT_MSG" != "null" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit --amend -m "$COMMIT_MSG" --no-verify
            git push --force-with-lease origin ${{ github.ref_name }}
            echo "Commit amended successfully"
          else
            echo "Failed to generate commit message"
          fi
