name: Auto Commit Message

on:
  push:
    branches-ignore:
      - main

permissions:
  contents: write

jobs:
  update-commit-message:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 20
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Fix all commit messages
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          BRANCH="${{ github.ref_name }}"
          
          COMMITS=$(git log origin/main..HEAD --oneline --no-merges --reverse)
          
          if [ -z "$COMMITS" ]; then
            echo "No commits"
            exit 0
          fi
          
          NEEDS_FIX=0
          
          echo "$COMMITS" | while read -r line; do
            SHA=$(echo "$line" | cut -d' ' -f1)
            MSG=$(echo "$line" | cut -d' ' -f2-)
            
            if echo "$MSG" | grep -qE "^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert):"; then
              echo "OK: $MSG"
            else
              echo "NEEDS FIX: $MSG"
              NEEDS_FIX=1
            fi
          done
          
          if [ "$NEEDS_FIX" = "0" ]; then
            echo "All commits OK"
            exit 0
          fi
          
          FIRST_BAD=$(git log origin/main..HEAD --oneline --no-merges --reverse | grep -vE "^[a-f0-9]+ (feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert):" | head -1 | cut -d' ' -f1)
          
          if [ -z "$FIRST_BAD" ]; then
            echo "No bad commits found"
            exit 0
          fi
          
          echo "First bad commit: $FIRST_BAD"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git rebase --onto "$FIRST_BAD~" "$FIRST_BAD" HEAD --exec '
            MSG=$(git log -1 --format=%s)
            if ! echo "$MSG" | grep -qE "^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert):"; then
              DIFF=$(git show HEAD --stat --format="" | head -c 1000)
              PROMPT="Generate conventional commit message in English. Format: type(scope): desc. Only return message. Old: $MSG"
              for MODEL in mimo-v2.5-free nemotron-3-super-free; do
                RESP=$(curl -s -X POST "https://opencode.ai/zen/v1/chat/completions" \
                  -H "Authorization: Bearer '"$OPENCODE_API_KEY"'" \
                  -H "Content-Type: application/json" \
                  -d "$(jq -n --arg p "$PROMPT" --arg m "$MODEL" '"'"'{"model":$m,"messages":[{"role":"user","content":$p}],"max_tokens":4096,"temperature":0.3}'"'"')")
                NEW=$(echo "$RESP" | jq -r '"'"'.choices[0].message.content // empty'"'"' 2>/dev/null | head -1 | cut -c1-72)
                if [ -n "$NEW" ] && [ "$NEW" != "null" ]; then
                  git commit --amend -m "$NEW" --no-verify
                  break
                fi
                sleep 1
              done
            fi
          ' 2>/dev/null || true
          
          if git push --force-with-lease origin "$BRANCH" 2>/dev/null; then
            echo "All commits fixed"
          else
            echo "Push failed"
          fi
