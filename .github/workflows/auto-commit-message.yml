name: Auto Commit Message

on:
  push:
    branches: ["*"]

permissions:
  contents: write

jobs:
  update-commit-message:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Generate commit message
        if: ${{ !contains(github.event.head_commit.message, ':') }}
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          DIFF=$(git diff HEAD~1 HEAD 2>/dev/null | head -c 3000)
          
          if [ -z "$DIFF" ]; then
            echo "No diff found, skipping"
            exit 0
          fi
          
          PROMPT="Generate a conventional commit message for this diff. Format: type(scope): description. Only return the commit message text, nothing else. Diff: $DIFF"
          
          RESPONSE=$(curl -s -X POST \
            "https://opencode.ai/zen/v1/chat/completions" \
            -H "Authorization: Bearer $OPENCODE_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg prompt "$PROMPT" \
              '{
                model: "mimo-v2.5-free",
                messages: [{role: "user", content: $prompt}],
                max_tokens: 4096,
                temperature: 0.3
              }')")
          
          echo "Response: $RESPONSE"
          
          COMMIT_MSG=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // .choices[0].message.reasoning' 2>/dev/null | head -1 | cut -c1-72)
          
          if [ -n "$COMMIT_MSG" ] && [ "$COMMIT_MSG" != "null" ] && [ "$COMMIT_MSG" != "" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit --amend -m "$COMMIT_MSG" --no-verify
            git push --force-with-lease origin ${{ github.ref_name }}
            echo "Commit amended to: $COMMIT_MSG"
          else
            echo "Failed to generate commit message"
            exit 1
          fi
