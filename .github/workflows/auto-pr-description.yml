name: Auto PR Description

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  update-pr-description:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate PR description
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          CURRENT_TITLE="${{ github.event.pull_request.title }}"
          
          DIFF=$(git diff origin/main...HEAD 2>/dev/null | head -c 5000)
          
          cat > /tmp/request.json << ENDJSON
          {
            "model": "mimo-v2.5-free",
            "messages": [
              {
                "role": "user",
                "content": "Generate PR title and description. Current title: ${CURRENT_TITLE}. Diff: ${DIFF}"
              }
            ],
            "max_tokens": 500,
            "temperature": 0.3
          }
          ENDJSON
          
          RESPONSE=$(curl -s -X POST \
            "https://opencode.ai/zen/v1/chat/completions" \
            -H "Authorization: Bearer $OPENCODE_API_KEY" \
            -H "Content-Type: application/json" \
            -d @/tmp/request.json)
          
          echo "Response: $RESPONSE"
          
          PR_CONTENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content' 2>/dev/null)
          
          if [ -n "$PR_CONTENT" ] && [ "$PR_CONTENT" != "null" ]; then
            NEW_TITLE=$(echo "$PR_CONTENT" | head -1 | cut -c1-72)
            NEW_BODY=$(echo "$PR_CONTENT" | tail -n +3)
            
            curl -s -X PATCH \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/pulls/$PR_NUMBER" \
              -d "{\"title\": \"$NEW_TITLE\", \"body\": $(echo "$NEW_BODY" | jq -Rs .)}"
            
            echo "PR updated successfully"
          else
            echo "Failed to generate PR description"
          fi
