name: Auto PR Description

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  update-pr-description:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Generate PR description
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          CURRENT_TITLE="${{ github.event.pull_request.title }}"
          
          DIFF=$(git diff origin/main...HEAD 2>/dev/null || git diff HEAD~1 HEAD 2>/dev/null || echo "")
          DIFF=$(echo "$DIFF" | head -c 5000)
          
          PROMPT="IMPORTANT: Respond ONLY in English. Generate a PR title and description for these changes. Current title: $CURRENT_TITLE. Format: First line is the title, then blank line, then description. All content must be in English. Diff: $DIFF"
          
          RESPONSE=$(curl -s -X POST \
            "https://opencode.ai/zen/v1/chat/completions" \
            -H "Authorization: Bearer $OPENCODE_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg prompt "$PROMPT" \
              '{
                model: "mimo-v2.5-free",
                messages: [{role: "user", content: $prompt}],
                max_tokens: 4096,
                temperature: 0.3
              }')")
          
          PR_CONTENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // .choices[0].message.reasoning' 2>/dev/null)
          
          if [ -n "$PR_CONTENT" ] && [ "$PR_CONTENT" != "null" ] && [ "$PR_CONTENT" != "" ]; then
            NEW_TITLE=$(echo "$PR_CONTENT" | head -1 | cut -c1-72)
            NEW_BODY=$(echo "$PR_CONTENT" | tail -n +3)
            
            curl -s -X PATCH \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/pulls/$PR_NUMBER" \
              -d "$(jq -n \
                --arg title "$NEW_TITLE" \
                --arg body "$NEW_BODY" \
                '{title: $title, body: $body}')"
            
            echo "PR #$PR_NUMBER updated"
          fi

      - name: Add labels
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          
          FILES=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/$PR_NUMBER/files" | \
            jq -r '.[].filename')
          
          LABELS=""
          
          if echo "$FILES" | grep -qE "\.github/workflows/"; then
            LABELS="$LABELS,ci"
          fi
          if echo "$FILES" | grep -qE "\.(py|js|ts|go|java)$"; then
            LABELS="$LABELS,code"
          fi
          if echo "$FILES" | grep -qE "(README|docs/|\.md)"; then
            LABELS="$LABELS,documentation"
          fi
          if echo "$FILES" | grep -qE "(test|spec)"; then
            LABELS="$LABELS,testing"
          fi
          if echo "$FILES" | grep -qE "(requirements|package\.json|\.toml|Dockerfile)"; then
            LABELS="$LABELS,dependencies"
          fi
          
          LABELS=$(echo "$LABELS" | sed 's/^,//')
          
          if [ -n "$LABELS" ]; then
            curl -s -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/issues/$PR_NUMBER/labels" \
              -d "$(jq -n --arg labels "$LABELS" '{labels: ($labels | split(","))}')"
            
            echo "Labels: $LABELS"
          fi

      - name: Add reviewer and assignee
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          
          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/$PR_NUMBER/requested_reviewers" \
            -d '{"reviewers":["JosephRiosHenao"]}'
          
          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/$PR_NUMBER/assignees" \
            -d "$(jq -n --arg user "$PR_AUTHOR" '{assignees: [$user]}')"
          
          echo "Reviewer: JosephRiosHenao | Assignee: $PR_AUTHOR"
