name: Auto PR Description

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  update-pr-description:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Generate PR title and description using OpenCode Zen API
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          
          DIFF=$(gh pr diff $PR_NUMBER --repo ${{ github.repository }} 2>/dev/null || git diff origin/main...HEAD)
          DIFF_TRUNCATED=$(echo "$DIFF" | head -c 5000)
          
          CURRENT_TITLE="${{ github.event.pull_request.title }}"
          
          PROMPT="You are a PR description generator. Analyze the following git diff and generate a proper PR title and description.

Current PR title: $CURRENT_TITLE

Generate:
1. A concise title (max 72 chars) following conventional commits format: type(scope): description
2. A blank line
3. A detailed description explaining:
   - What changes were made
   - Why these changes were made
   - Any important notes or breaking changes

Types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert

Rules:
- Use imperative mood
- Focus on the WHY as much as the WHAT
- Include any breaking changes or migration notes
- Keep title under 72 characters

Git diff to analyze:
$DIFF_TRUNCATED"
          
          RESPONSE=$(curl -s -X POST \
            "https://opencode.ai/zen/v1/chat/completions" \
            -H "Authorization: Bearer $OPENCODE_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"mimo-v2.5-free\",
              \"messages\": [{\"role\": \"user\", \"content\": $(echo "$PROMPT" | jq -Rs .)}],
              \"max_tokens\": 500,
              \"temperature\": 0.3
            }")
          
          PR_CONTENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content')
          
          NEW_TITLE=$(echo "$PR_CONTENT" | head -1)
          NEW_BODY=$(echo "$PR_CONTENT" | tail -n +3)
          
          NEW_TITLE=$(echo "$NEW_TITLE" | sed 's/^"//;s/"$//' | head -c 72)
          
          echo "Generated PR title: $NEW_TITLE"
          echo "---"
          echo "Generated PR body:"
          echo "$NEW_BODY"
          
          gh pr edit $PR_NUMBER \
            --repo ${{ github.repository }} \
            --title "$NEW_TITLE" \
            --body "$NEW_BODY" \
            --token $GITHUB_TOKEN
